<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Full Stack Project</title>
  </head>
  <body>
   <section id="logged-out-view">
            <div class="container">
                <h1 class="app-title">Hot-and-Cold</h1>
                
                <div class="provider-buttons">
                    <button id="sign-in-with-google-btn" class="provider-btn">
                        <img src="assets/providers/google.png" class="google-btn-logo">
                        Sign in with Google
                    </button>
                </div>
                
                <div class="auth-fields-and-buttons">
                    <input id="email-input" type="email" placeholder="Email">
                    <input id="password-input" type="password" placeholder="Password">
                    
                    <button id="sign-in-btn" class="primary-btn">Sign in</button>
                    <button id="create-account-btn" class="secondary-btn">Create Account</button>
                </div>
            </div>
        </section>
        
        <section id="logged-in-view">
            <div class="container">
                <!-- log out button-->
                <nav>
                    <button id="sign-out-btn" class="icon-btn">
                        <img src="assets/icons/logOut.jpg" class="icon-img-btn">
                    </button>
                </nav>

                <div class="app-container">
                    <div class="user-section">
                        <img id="user-profile-picture">
                        <h2 id="user-greeting"></h2>
                    </div>
                </div>
                <div class="trip-section">
                    <h2>Station:</h2>
                    <input id="station-input" placeholder="Station Destination"></input>
                    <input id="walkingTime-input" placeholder="Time it takes: HH:MM:SS"></input>
                    
                    <div class="mta-grid">
                        <div class="train-card" onclick="selectGroup('ace')">
                            <div class="symbol-container">
                                <span class="bullet blue">A</span>
                                <span class="bullet blue">C</span>
                                <span class="bullet blue">E</span>
                                <span class="bullet grey small-text">S<sup>R</sup></span>
                            </div>
                        </div>

                        <div class="train-card" onclick="selectGroup('bdfm')">
                            <div class="symbol-container">
                                <span class="bullet orange">B</span>
                                <span class="bullet orange">D</span>
                                <span class="bullet orange">F</span>
                                <span class="bullet orange">M</span>
                                <span class="bullet grey small-text">S<sup>F</sup></span>
                            </div>
                        </div>

                        <div class="train-card" onclick="selectGroup('nqrw')">
                            <div class="symbol-container">
                                <span class="bullet yellow">N</span>
                                <span class="bullet yellow">Q</span>
                                <span class="bullet yellow">R</span>
                                <span class="bullet yellow">W</span>
                            </div>
                        </div>

                        <div class="train-card" onclick="selectGroup('numbered')">
                            <div class="symbol-container">
                                <span class="bullet red">1</span>
                                <span class="bullet red">2</span>
                                <span class="bullet red">3</span>
                                <span class="bullet green">4</span>
                                <span class="bullet green">5</span>
                                <span class="bullet green">6</span>
                                <span class="bullet purple">7</span>
                            </div>
                        </div>

                        <div class="train-card" onclick="selectGroup('g')">
                            <div class="symbol-container">
                                <span class="bullet lightgreen">G</span>
                            </div>
                        </div>

                        <div class="train-card" onclick="selectGroup('jz')">
                            <div class="symbol-container">
                                <span class="bullet brown">J</span>
                                <span class="bullet brown">Z</span>
                            </div>
                        </div>
                    </div>

                    <button id="getTrain-btn" class="primary-btn">Get Trains</button>
                </div>
            </div>
        </section>
        <script src="index.js" type="module"></script>
        <link rel="stylesheet" href="index.css">

    </body>
  </body>
</html>
